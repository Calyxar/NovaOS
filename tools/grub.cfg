set timeout=10
set default=0

insmod all_video
insmod vbe
insmod vga
insmod gfxterm

menuentry "NovaOS - 800x600" {
    set gfxmode=800x600x32
    set gfxpayload=keep
    multiboot /boot/NovaOS.bin
    boot
}
menuentry "NovaOS - 1024x768" {
    set gfxmode=1024x768x32
    set gfxpayload=keep
    multiboot /boot/NovaOS.bin
    boot
}
menuentry "NovaOS - 1280x720" {
    set gfxmode=1280x720x32
    set gfxpayload=keep
    multiboot /boot/NovaOS.bin
    boot
}
menuentry "NovaOS (safe mode - 800x600)" {
    set gfxmode=800x600x32
    set gfxpayload=keep
    multiboot /boot/NovaOS.bin safe
    boot
}
